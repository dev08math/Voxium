<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxium — Meeting {{ meeting_id }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #060606;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 2rem;
        }
        h1 {
            color: #00d4aa;
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
        }
        #status {
            color: #888;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        #status.error { color: #ff4444; }
        #status.complete { color: #00d4aa; }
        #transcript {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .utterance {
            display: flex;
            gap: 1rem;
            padding: 0.6rem 0;
            border-bottom: 1px solid #1a1a1a;
        }
        .timestamp {
            font-family: 'Courier New', monospace;
            color: #00d4aa;
            font-size: 0.8rem;
            min-width: 6rem;
            flex-shrink: 0;
            padding-top: 0.15rem;
        }
        .speaker {
            color: #aaa;
            font-weight: 600;
            font-size: 0.85rem;
            min-width: 5rem;
            flex-shrink: 0;
            padding-top: 0.15rem;
        }
        .text {
            color: #e0e0e0;
            line-height: 1.5;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <h1>Meeting {{ meeting_id }}</h1>
    <div id="status">Loading...</div>
    <div id="transcript"></div>

    <script>
        const meetingId = "{{ meeting_id }}";
        const statusEl = document.getElementById("status");
        const transcriptEl = document.getElementById("transcript");

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
        }

        function renderTranscript(data) {
            transcriptEl.innerHTML = "";
            for (const seg of data.segments) {
                const div = document.createElement("div");
                div.className = "utterance";
                div.innerHTML = `
                    <span class="timestamp">${formatTime(seg.start)} – ${formatTime(seg.end)}</span>
                    <span class="speaker">${seg.speaker}</span>
                    <span class="text">${seg.text}</span>
                `;
                transcriptEl.appendChild(div);
            }
        }

        async function poll() {
            try {
                const res = await fetch(`/api/meeting/${meetingId}`);
                if (res.status === 202) {
                    statusEl.textContent = "Processing...";
                    statusEl.className = "";
                    setTimeout(poll, 2000);
                    return;
                }
                if (!res.ok) {
                    const err = await res.json();
                    statusEl.textContent = `Error: ${err.detail || res.statusText}`;
                    statusEl.className = "error";
                    return;
                }
                const data = await res.json();
                statusEl.textContent = `Complete — ${data.segments.length} segments`;
                statusEl.className = "complete";
                renderTranscript(data);
            } catch (e) {
                statusEl.textContent = `Error: ${e.message}`;
                statusEl.className = "error";
                setTimeout(poll, 3000);
            }
        }

        poll();
    </script>
</body>
</html>
