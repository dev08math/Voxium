services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: voxium
      POSTGRES_PASSWORD: voxium
      POSTGRES_DB: voxium
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
